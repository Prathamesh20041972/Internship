<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BMI Calculator</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
  }

  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  h2 {
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 16px;
    cursor: pointer;
    background: #00c853;
    color: white;
    transition: 0.2s;
  }

  button:active {
    transform: scale(0.95);
  }

  #result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
    transition: 0.3s;
  }

  .underweight { color: #00e5ff; }
  .normal { color: #00e676; }
  .overweight { color: #ffea00; }
  .obese { color: #ff1744; }
</style>
</head>

<body>

<div class="card">
  <h2>BMI Calculator</h2>

  <input type="number" id="height" placeholder="Height (cm)">
  <input type="number" id="weight" placeholder="Weight (kg)">

  <button onclick="calculateBMI()">Calculate</button>

  <div id="result"></div>
</div>

<script>
function calculateBMI() {
  const height = document.getElementById("height").value;
  const weight = document.getElementById("weight").value;
  const result = document.getElementById("result");

  if (!height || !weight) {
    result.textContent = "Enter valid values";
    return;
  }

  const h = height / 100;
  const bmi = (weight / (h * h)).toFixed(1);

  let category = "";
  let className = "";

  if (bmi < 18.5) {
    category = "Underweight";
    className = "underweight";
  } else if (bmi < 25) {
    category = "Normal";
    className = "normal";
  } else if (bmi < 30) {
    category = "Overweight";
    className = "overweight";
  } else {
    category = "Obese";
    className = "obese";
  }

  result.className = className;
  result.textContent = `BMI: ${bmi} (${category})`;

  // Animation
  result.style.transform = "scale(1.2)";
  setTimeout(() => result.style.transform = "scale(1)", 200);
}
</script>

</body>
</html>
