<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Counter</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      color: #ddd;
      margin-bottom: 20px;
      font-weight: 400;
    }

    #counter {
      font-size: 64px;
      font-weight: bold;
      margin: 20px 0;
      transition: all 0.3s ease;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    button {
      flex: 1;
      margin: 5px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:active {
      transform: scale(0.9);
    }

    .increase {
      background: #00c853;
      color: white;
    }

    .decrease {
      background: #ff1744;
      color: white;
    }

    .reset {
      background: #607d8b;
      color: white;
    }

    /* Glow effects */
    .positive {
      color: #00e676;
      text-shadow: 0 0 15px rgba(0,255,150,0.7);
    }

    .negative {
      color: #ff5252;
      text-shadow: 0 0 15px rgba(255,0,0,0.7);
    }

    .zero {
      color: #ffffff;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Counter</h1>
  <div id="counter" class="zero">0</div>

  <div class="buttons">
    <button class="decrease">−</button>
    <button class="reset">⟳</button>
    <button class="increase">+</button>
  </div>
</div>

<script>
  let count = 0;

  const counter = document.getElementById("counter");
  const incBtn = document.querySelector(".increase");
  const decBtn = document.querySelector(".decrease");
  const resetBtn = document.querySelector(".reset");

  function updateUI() {
    counter.textContent = count;

    counter.classList.remove("positive", "negative", "zero");

    if (count > 0) {
      counter.classList.add("positive");
    } else if (count < 0) {
      counter.classList.add("negative");
    } else {
      counter.classList.add("zero");
    }

    // Animate number pop
    counter.style.transform = "scale(1.2)";
    setTimeout(() => {
      counter.style.transform = "scale(1)";
    }, 150);
  }

  incBtn.addEventListener("click", () => {
    count++;
    updateUI();
  });

  decBtn.addEventListener("click", () => {
    count--;
    updateUI();
  });

  resetBtn.addEventListener("click", () => {
    count = 0;
    updateUI();
  });
</script>

</body>
</html>
