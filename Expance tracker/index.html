<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Dashboard</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
  }

  .header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 24px;
  }

  .container {
    padding: 20px;
    max-width: 1000px;
    margin: auto;
  }

  .cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  .card {
    flex: 1;
    padding: 20px;
    border-radius: 10px;
    color: white;
    text-align: center;
  }

  .income { background: #27ae60; }
  .expense { background: #e74c3c; }
  .balance { background: #2980b9; }

  .card h2 {
    margin: 10px 0;
  }

  .form {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .form input, .form select, .form button {
    padding: 10px;
    flex: 1;
  }

  .form button {
    background: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
  }

  .income-text { color: green; }
  .expense-text { color: red; }
</style>
</head>
<body>

<div class="header">💰 Expense Dashboard</div>

<div class="container">

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card income">
      <h3>Total Income</h3>
      <h2>₹<span id="income">0</span></h2>
    </div>
    <div class="card expense">
      <h3>Total Expense</h3>
      <h2>₹<span id="expense">0</span></h2>
    </div>
    <div class="card balance">
      <h3>Balance</h3>
      <h2>₹<span id="balance">0</span></h2>
    </div>
  </div>

  <!-- Input Form -->
  <div class="form">
    <input type="date" id="date">
    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <button onclick="addTransaction()">Add</button>
  </div>

  <!-- Table -->
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Amount</th>
        <th>Type</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

<script>
let income = 0;
let expense = 0;

function addTransaction() {
  const date = document.getElementById('date').value;
  const desc = document.getElementById('desc').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const type = document.getElementById('type').value;

  if (!date || !desc || isNaN(amount)) {
    alert("Fill all fields");
    return;
  }

  const row = document.createElement('tr');

  row.innerHTML = `
    <td>${date}</td>
    <td>${desc}</td>
    <td class="${type}-text">₹${amount}</td>
    <td>${type}</td>
  `;

  document.getElementById('list').appendChild(row);

  if (type === "income") {
    income += amount;
  } else {
    expense += amount;
  }

  updateDashboard();

  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
}

function updateDashboard() {
  document.getElementById('income').innerText = income;
  document.getElementById('expense').innerText = expense;
  document.getElementById('balance').innerText = income - expense;
}
</script>

</body>
</html>
