<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Expanding Cards</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
      font-family: "Segoe UI", sans-serif;
    }

    .container {
      display: flex;
      width: 90vw;
      max-width: 1100px;
      gap: 12px;
    }

    .card {
      position: relative;
      flex: 0.5;
      height: 70vh;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: flex 0.5s ease-in-out, transform 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card.active {
      flex: 5;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7);
      transition: filter 0.5s ease;
    }

    .card.active img {
      filter: brightness(1);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      color: #fff;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s ease;
    }

    .card.active .overlay {
      opacity: 1;
      transform: translateY(0);
    }

    h3 {
      font-size: 24px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        height: 90vh;
      }

      .card {
        height: 100%;
      }

      .card.active {
        flex: 3;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card active">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" />
    <div class="overlay"><h3>Mountains</h3></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" />
    <div class="overlay"><h3>Forest</h3></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3" />
    <div class="overlay"><h3>Beach</h3></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" />
    <div class="overlay"><h3>Desert</h3></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" />
    <div class="overlay"><h3>City</h3></div>
  </div>
</div>

<script>
  const cards = document.querySelectorAll('.card');

  function removeActive() {
    cards.forEach(card => card.classList.remove('active'));
  }

  cards.forEach(card => {
    card.addEventListener('click', () => {
      removeActive();
      card.classList.add('active');
    });
  });

  // Keyboard navigation
  let current = 0;

  // Sync current index with initially active card
  cards.forEach((card, index) => {
    if (card.classList.contains('active')) current = index;
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') {
      current = (current + 1) % cards.length;
    }
    if (e.key === 'ArrowLeft') {
      current = (current - 1 + cards.length) % cards.length;
    }

    removeActive();
    cards[current].classList.add('active');
  });

  // Swipe support
  let startX = 0;

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  });

  document.addEventListener('touchend', e => {
    let endX = e.changedTouches[0].clientX;

    if (endX > startX + 50) current--;
    else if (endX < startX - 50) current++;

    current = (current + cards.length) % cards.length;

    removeActive();
    cards[current].classList.add('active');
  });
</script>

</body>
</html>
